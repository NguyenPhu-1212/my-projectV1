<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Seed Data</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #229954; }
        .status { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Nhập Dữ Liệu Giao Dịch Mẫu</h1>
        <p>Bấm nút để thêm 200+ giao dịch từ 21/4/2025 đến 21/4/2026</p>
        <button onclick="seedData()">Nhập Dữ Liệu</button>
        <div id="status"></div>
    </div>

    <script>
        function seedData() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Đang xử lý...';
            statusDiv.className = '';

            try {
                // Danh mục Thu (bán hàng)
                const thuCategories = ["Khô gà", "Khô bò", "Mực rim", "Bánh gấu", "Dâu sấy", "Mít sấy", "Heo quay"];
                
                // Danh mục Chi (chi phí)
                const chiCategories = ["Nhân công", "Nguyên liệu", "Máy móc"];

                const transactions = [];
                const startDate = new Date(2025, 3, 21); // 21/4/2025
                const endDate = new Date(2026, 3, 21);   // 21/4/2026

                // Tạo giao dịch thu (bán hàng) - mỗi 2-3 ngày bán 1-2 sản phẩm
                let currentDate = new Date(startDate);
                while (currentDate <= endDate) {
                    // Quyết định xem có bán hàng ngày này không (70% là có)
                    if (Math.random() < 0.7) {
                        // Số lượng bán hàng trong ngày
                        const numSales = Math.random() < 0.3 ? 2 : 1;
                        
                        for (let i = 0; i < numSales; i++) {
                            const category = thuCategories[Math.floor(Math.random() * thuCategories.length)];
                            const baseAmount = {
                                "Khô gà": 150000,
                                "Khô bò": 200000,
                                "Mực rim": 180000,
                                "Bánh gấu": 120000,
                                "Dâu sấy": 100000,
                                "Mít sấy": 90000,
                                "Heo quay": 300000
                            }[category];
                            
                            const variation = baseAmount * (0.8 + Math.random() * 0.4);
                            
                            transactions.push({
                                type: 'thu',
                                amount: Math.floor(variation),
                                category: category,
                                date: currentDate.toISOString().split('T')[0],
                                note: `Bán ${category}`
                            });
                        }
                    }

                    // Quyết định xem có chi tiêu ngày này không (40% là có)
                    if (Math.random() < 0.4) {
                        const category = chiCategories[Math.floor(Math.random() * chiCategories.length)];
                        const baseAmount = {
                            "Nhân công": 2000000,
                            "Nguyên liệu": 1500000,
                            "Máy móc": 5000000
                        }[category];
                        
                        const variation = baseAmount * (0.7 + Math.random() * 0.6);
                        
                        transactions.push({
                            type: 'chi',
                            amount: Math.floor(variation),
                            category: category,
                            date: currentDate.toISOString().split('T')[0],
                            note: `Chi ${category}`
                        });
                    }

                    // Tiến đến ngày tiếp theo
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                // Lưu vào localStorage
                localStorage.setItem('finance', JSON.stringify(transactions));
                localStorage.setItem('login', 'true');

                statusDiv.innerHTML = `
                    <strong>✅ Thành công!</strong><br>
                    Đã nhập ${transactions.length} giao dịch.<br>
                    Bây giờ bạn có thể <a href="index.html">quay lại ứng dụng</a> để xem dữ liệu.
                `;
                statusDiv.className = 'status success';
            } catch (error) {
                statusDiv.innerHTML = `
                    <strong>❌ Lỗi:</strong><br>
                    ${error.message}
                `;
                statusDiv.className = 'status error';
            }
        }
    </script>
</body>
</html>
